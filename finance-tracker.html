<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F9F7F5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>记账本</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
<style>
/* ============================================================
   DESIGN SYSTEM — Warm, minimal, breathable
   ============================================================ */
:root {
  --color-primary: #E8735A;
  --color-primary-light: #F2917D;
  --color-primary-dark: #D4654C;
  --color-primary-bg: #FEF5F2;
  --color-primary-ghost: rgba(232,115,90,0.08);
  --color-danger: #E85555;
  --color-danger-bg: #FEF5F5;
  --color-success: #5BAA6A;
  --color-success-bg: #F2FAF5;
  --color-warning: #E8A250;
  --color-info: #5B9CF5;
  --color-income: #2E9E5F;
  --color-income-bg: #EDF8F2;
  --color-bg: #F9F7F5;
  --color-surface: #FFFFFF;
  --color-border: #EEEAE6;
  --color-divider: #F0EDE9;
  --color-text: #1C1917;
  --color-text-secondary: #6B6560;
  --color-text-muted: #A8A29E;
  --color-text-ghost: #C4BFBA;

  --cat-餐饮伙食: #F08C5A; --cat-餐饮伙食-bg: #FFF6F0;
  --cat-居住住房: #7B75F0; --cat-居住住房-bg: #F2F1FE;
  --cat-水电通讯: #3DB8A8; --cat-水电通讯-bg: #F0FAF8;
  --cat-交通出行: #9B8DF5; --cat-交通出行-bg: #F7F5FF;
  --cat-日常用品: #8EC63F; --cat-日常用品-bg: #F6FAF0;
  --cat-服饰穿搭: #F062A0; --cat-服饰穿搭-bg: #FEF5F8;
  --cat-数码娱乐: #F06060; --cat-数码娱乐-bg: #FEF5F5;
  --cat-旅游度假: #3CC0D6; --cat-旅游度假-bg: #F0FAFC;
  --cat-医疗健康: #3DBE8A; --cat-医疗健康-bg: #F0FAF5;
  --cat-人情社交: #F5A623; --cat-人情社交-bg: #FFFBF2;
  --cat-学习成长: #5B9CF5; --cat-学习成长-bg: #F2F7FE;
  --cat-其他杂项: #8C8279; --cat-其他杂项-bg: #F8F7F5;

  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  --font-mono: "SF Mono", ui-monospace, "Cascadia Code", monospace;
  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;
  --radius-sm: 8px; --radius-md: 14px; --radius-lg: 20px; --radius-xl: 24px; --radius-full: 9999px;
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.03);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.02);
  --ease-out: cubic-bezier(0.25, 0.1, 0.25, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
body {
  font-family: var(--font-sans); background: var(--color-bg); color: var(--color-text);
  line-height: 1.5; min-height: 100vh; min-height: 100dvh;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
#app { max-width: 960px; margin: 0 auto; min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

/* ---- Header ---- */
#app-header {
  background: linear-gradient(160deg, #E8735A 0%, #F08C6A 100%); color: #fff;
  padding: var(--space-3) var(--space-5); display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
#app-header .title { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.01em; display: flex; align-items: center; gap: 6px; }
#app-header .header-stats { display: flex; gap: var(--space-4); text-align: right; }
#app-header .header-stat .h-label { font-size: 0.6rem; opacity: 0.7; font-weight: 400; }
#app-header .header-stat .h-amount { font-size: 0.9rem; font-weight: 700; font-family: var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
#app-header .header-stat .h-amount.net-positive { color: #A8F0C0; }
#app-header .header-stat .h-amount.net-negative { color: #FFD0C0; }

/* ---- Tab Nav ---- */
#tab-nav {
  display: flex; background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--color-border); position: sticky; top: 0; z-index: 99;
  overflow-x: auto; scrollbar-width: none;
}
#tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 1 0 auto; padding: 12px var(--space-2); border: none; background: none;
  font-size: 0.82rem; font-family: var(--font-sans); color: var(--color-text-secondary);
  cursor: pointer; white-space: nowrap; min-height: 46px; position: relative;
  transition: color 0.2s var(--ease-out); font-weight: 500;
}
.tab-btn:active { color: var(--color-primary); }
.tab-btn.active { color: var(--color-primary); font-weight: 600; }
.tab-btn.active::after { content:''; position:absolute; bottom:6px; left:50%; transform:translateX(-50%); width:20px; height:3px; background:var(--color-primary); border-radius:3px; }

@media (max-width: 767px) {
  #tab-nav { position:fixed; bottom:0; left:0; right:0; top:auto; border-bottom:none; border-top:1px solid var(--color-divider); padding-bottom:env(safe-area-inset-bottom,0); z-index:100; }
  .tab-btn { padding:8px var(--space-2) 10px; min-height:52px; font-size:0.75rem; }
  .tab-btn.active::after { bottom:2px; width:6px; height:6px; border-radius:50%; }
  #tab-content { padding-bottom: calc(82px + env(safe-area-inset-bottom, 0)); }
  #app-header .header-stats { gap: var(--space-2); }
  #app-header .header-stat .h-amount { font-size: 0.78rem; }
}
@media (min-width: 768px) {
  #tab-nav { position:sticky; top:44px; }
  .tab-btn { font-size:0.85rem; }
  #tab-content { padding-bottom: var(--space-8); }
}

/* ---- Tab Content ---- */
#tab-content { flex:1; padding:var(--space-4) var(--space-4) var(--space-10); }
.tab-panel { display:none; }
.tab-panel.active { display:block; animation: tabEnter 0.35s var(--ease-out); }
@keyframes tabEnter { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }

/* ---- Type Toggle (支出/收入) ---- */
.type-toggle { display:flex; gap:var(--space-2); margin-bottom:var(--space-3); }
.type-toggle-btn {
  flex:1; padding:10px 16px; border:2px solid var(--color-divider); border-radius:var(--radius-md);
  background:var(--color-surface); font-size:0.9rem; font-family:var(--font-sans); font-weight:550;
  cursor:pointer; transition: all 0.2s var(--ease-out); text-align:center; user-select:none;
}
.type-toggle-btn.expense.active { background:var(--color-primary-bg); border-color:var(--color-primary); color:var(--color-primary-dark); }
.type-toggle-btn.income.active { background:var(--color-income-bg); border-color:var(--color-income); color:var(--color-income); }

/* ---- Quick Add ---- */
.quick-add { background:var(--color-surface); border-radius:var(--radius-xl); padding:var(--space-5); margin-bottom:var(--space-4); box-shadow:var(--shadow-sm); }
.quick-add .date-row { display:flex; align-items:center; gap:var(--space-2); margin-bottom:var(--space-3); font-size:0.82rem; color:var(--color-text-secondary); }
.quick-add .date-row input[type="date"] { border:none; background:var(--color-bg); border-radius:var(--radius-sm); padding:5px 10px; font-size:0.82rem; font-family:var(--font-sans); color:var(--color-text); outline:none; }
.amount-input-wrap { margin-bottom:var(--space-3); position:relative; }
.amount-input-wrap input { width:100%; padding:14px 0 10px 28px; font-size:1.6rem; font-weight:700; font-family:var(--font-mono); font-variant-numeric:tabular-nums; letter-spacing:-0.03em; border:none; border-bottom:2px solid var(--color-divider); border-radius:0; background:transparent; color:var(--color-text); transition:border-color 0.2s var(--ease-out); outline:none; }
.amount-input-wrap input:focus { border-bottom-color:var(--color-primary); }
.amount-input-wrap input::placeholder { color:var(--color-text-ghost); font-weight:400; font-size:1.3rem; }
.amount-input-wrap .currency-symbol { position:absolute; left:2px; top:15px; font-size:1.3rem; font-weight:600; color:var(--color-text-muted); }
.quick-amounts { display:flex; gap:var(--space-2); flex-wrap:wrap; margin-bottom:var(--space-4); }
.quick-amount-btn { padding:8px 16px; border:1px solid var(--color-border); border-radius:var(--radius-full); background:var(--color-surface); color:var(--color-text-secondary); font-size:0.8rem; font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-weight:500; cursor:pointer; transition:all 0.2s var(--ease-out); white-space:nowrap; min-height:36px; user-select:none; }
.quick-amount-btn:active { background:var(--color-primary-bg); border-color:var(--color-primary-light); color:var(--color-primary); transform:scale(0.95); }
.category-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:var(--space-2); margin-bottom:var(--space-4); }
.category-chip { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px 4px; border:none; border-radius:var(--radius-md); background:var(--color-bg); cursor:pointer; transition:all 0.2s var(--ease-out); min-height:60px; user-select:none; position:relative; }
.category-chip .emoji { font-size:1.3rem; line-height:1; margin-bottom:4px; transition:transform 0.2s var(--ease-out); }
.category-chip .name { font-size:0.68rem; color:var(--color-text-secondary); line-height:1.2; text-align:center; transition:color 0.2s; }
.category-chip:active { transform:scale(0.94); background:#f0ece8; }
.category-chip.selected { background:var(--color-primary-bg); box-shadow:inset 0 0 0 2px var(--color-primary-light); }
.category-chip.selected .emoji { transform:scale(1.12); }
.category-chip.selected .name { color:var(--color-primary-dark); font-weight:600; }
.category-chip.income-chip.selected { background:var(--color-income-bg); box-shadow:inset 0 0 0 2px var(--color-income); }
.category-chip.income-chip.selected .name { color:var(--color-income); }
.note-input { width:100%; padding:10px 0; font-size:0.85rem; font-family:var(--font-sans); border:none; border-bottom:1.5px solid var(--color-divider); background:transparent; color:var(--color-text); margin-bottom:var(--space-4); outline:none; transition:border-color 0.2s; }
.note-input:focus { border-bottom-color:var(--color-primary-light); }
.note-input::placeholder { color:var(--color-text-ghost); }
.submit-btn { width:100%; padding:14px; border:none; border-radius:var(--radius-lg); background:linear-gradient(135deg,var(--color-primary) 0%,var(--color-primary-light) 100%); color:#fff; font-size:1rem; font-weight:650; font-family:var(--font-sans); cursor:pointer; transition:all 0.2s var(--ease-out); min-height:50px; box-shadow:0 4px 14px rgba(232,115,90,0.25); letter-spacing:0.04em; }
.submit-btn:active { transform:scale(0.97); box-shadow:0 2px 6px rgba(232,115,90,0.2); }
.submit-btn.income-submit { background:linear-gradient(135deg,var(--color-income) 0%,#4CB876 100%); box-shadow:0 4px 14px rgba(46,158,95,0.25); }

/* ---- Summary Card ---- */
.summary-card { background:var(--color-surface); border-radius:var(--radius-lg); padding:var(--space-5); margin-bottom:var(--space-4); box-shadow:var(--shadow-xs); display:grid; grid-template-columns:repeat(5,1fr); gap:var(--space-2); text-align:center; }
.summary-stat .stat-value { font-size:1.05rem; font-weight:700; font-family:var(--font-mono); font-variant-numeric:tabular-nums; color:var(--color-text); letter-spacing:-0.02em; }
.summary-stat .stat-label { font-size:0.68rem; color:var(--color-text-muted); margin-top:3px; font-weight:400; }
.summary-stat.highlight .stat-value { color:var(--color-primary-dark); }
.summary-stat.income-stat .stat-value { color:var(--color-income); }
.summary-stat.net-stat .stat-value.positive { color:var(--color-income); }
.summary-stat.net-stat .stat-value.negative { color:var(--color-danger); }
.summary-type-toggle { display:flex; gap:6px; margin-bottom:var(--space-3); }
.summary-type-pill { padding:6px 14px; border:1px solid var(--color-border); border-radius:var(--radius-full); background:var(--color-surface); font-size:0.76rem; font-family:var(--font-sans); cursor:pointer; color:var(--color-text-secondary); transition:all 0.15s var(--ease-out); }
.summary-type-pill.active { background:var(--color-primary); color:#fff; border-color:var(--color-primary); }

.section-title { font-size:0.82rem; font-weight:600; color:var(--color-text-secondary); margin-bottom:var(--space-3); margin-top:var(--space-2); letter-spacing:0.01em; }

/* ---- Record List ---- */
.record-list { display:flex; flex-direction:column; }
.record-item { display:flex; align-items:center; padding:12px var(--space-1); background:transparent; gap:var(--space-3); transition:all 0.2s var(--ease-out); position:relative; overflow:hidden; border-bottom:1px solid var(--color-divider); }
.record-item:last-child { border-bottom:none; }
.record-item.deleting { transform:translateX(-100%); opacity:0; max-height:0; padding:0; border-bottom:none; transition:all 0.3s var(--ease-out); }
.record-item .record-type-badge { font-size:0.65rem; font-weight:600; padding:2px 7px; border-radius:var(--radius-full); flex-shrink:0; }
.record-item .record-type-badge.expense { background:var(--color-primary-bg); color:var(--color-primary-dark); }
.record-item .record-type-badge.income { background:var(--color-income-bg); color:var(--color-income); }
.record-item .cat-icon { width:34px; height:34px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:1.05rem; flex-shrink:0; background:var(--color-bg); }
.record-item .record-info { flex:1; min-width:0; }
.record-item .record-category { font-size:0.88rem; font-weight:500; }
.record-item .record-meta { font-size:0.72rem; color:var(--color-text-muted); display:flex; gap:6px; margin-top:1px; }
.record-item .record-amount { font-size:0.95rem; font-weight:700; font-family:var(--font-mono); font-variant-numeric:tabular-nums; flex-shrink:0; letter-spacing:-0.02em; }
.record-item .record-amount.expense { color:var(--color-text); }
.record-item .record-amount.income { color:var(--color-income); }
.record-item .record-actions { display:flex; gap:1px; flex-shrink:0; opacity:0.4; transition:opacity 0.2s; }
.record-item:active .record-actions, .record-item:hover .record-actions { opacity:1; }
.record-item .btn-icon { width:30px; height:30px; border:none; border-radius:var(--radius-sm); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:0.8rem; color:var(--color-text-muted); transition:all 0.15s; }
.record-item .btn-icon:active { background:var(--color-bg); }
.record-item .btn-icon.delete:active { background:var(--color-danger-bg); color:var(--color-danger); }
.record-item.editing { flex-wrap:wrap; padding:var(--space-3) 0; background:var(--color-bg); border-radius:var(--radius-sm); margin:4px 0; }
.record-item .edit-form { display:none; width:100%; gap:var(--space-2); padding:0 var(--space-1); }
.record-item.editing .edit-form { display:flex; flex-wrap:wrap; align-items:center; }
.record-item.editing .record-info, .record-item.editing .record-amount, .record-item.editing .record-actions, .record-item.editing .record-type-badge { display:none; }
.edit-form input, .edit-form select { padding:7px 10px; border:1px solid var(--color-border); border-radius:var(--radius-sm); font-size:0.84rem; font-family:var(--font-sans); background:var(--color-surface); }
.edit-form input[type="number"] { width:100px; font-family:var(--font-mono); }
.edit-form input[type="date"] { width:130px; }
.edit-form select { min-width:100px; }
.edit-form .btn-sm { padding:7px 14px; border:none; border-radius:var(--radius-sm); font-size:0.8rem; font-family:var(--font-sans); cursor:pointer; font-weight:500; }
.edit-form .btn-sm.save { background:var(--color-primary); color:#fff; }
.edit-form .btn-sm.cancel { background:var(--color-bg); color:var(--color-text-secondary); border:1px solid var(--color-border); }
.date-group-header { font-size:0.75rem; font-weight:600; color:var(--color-text-muted); padding:var(--space-4) 0 var(--space-1) 0; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--color-bg); z-index:1; }
.date-group-header .day-total { font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-size:0.75rem; font-weight:500; }
.empty-state { text-align:center; padding:var(--space-10) var(--space-5); color:var(--color-text-muted); }
.empty-state .empty-icon { font-size:3.5rem; margin-bottom:var(--space-4); opacity:0.6; }
.empty-state .empty-text { font-size:0.9rem; line-height:1.7; }

/* ---- Toast ---- */
#toast-container { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:var(--space-2); pointer-events:none; }
.toast { padding:11px 18px; background:rgba(28,25,23,0.88); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); color:#fff; border-radius:var(--radius-full); font-size:0.82rem; box-shadow:0 8px 24px rgba(0,0,0,0.15); display:flex; align-items:center; gap:var(--space-2); pointer-events:auto; animation:toastIn 0.35s var(--ease-spring); white-space:nowrap; }
.toast.out { animation:toastOut 0.25s ease forwards; }
.toast .undo-btn { background:rgba(255,255,255,0.18); border:none; color:#fff; padding:4px 12px; border-radius:var(--radius-full); font-size:0.78rem; font-family:var(--font-sans); cursor:pointer; font-weight:600; }
@keyframes toastIn { from{opacity:0;transform:translateY(12px) scale(0.9);} to{opacity:1;transform:translateY(0) scale(1);} }
@keyframes toastOut { from{opacity:1;transform:translateY(0) scale(1);} to{opacity:0;transform:translateY(12px) scale(0.9);} }

/* ---- Period Selector ---- */
.period-selector { display:flex; gap:6px; margin-bottom:var(--space-4); align-items:center; flex-wrap:wrap; }
.period-pill { padding:8px 16px; border:1px solid var(--color-border); border-radius:var(--radius-full); background:var(--color-surface); font-size:0.8rem; font-family:var(--font-sans); cursor:pointer; color:var(--color-text-secondary); font-weight:500; transition:all 0.2s var(--ease-out); min-height:36px; white-space:nowrap; user-select:none; }
.period-pill:active { background:var(--color-primary-bg); border-color:var(--color-primary-light); }
.period-pill.active { background:var(--color-primary); color:#fff; border-color:var(--color-primary); font-weight:600; box-shadow:0 2px 8px rgba(232,115,90,0.2); }
.year-nav-group { display:flex; align-items:center; gap:0; margin-left:auto; }
.year-nav-btn { width:30px; height:30px; border:none; border-radius:var(--radius-full); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:0.85rem; color:var(--color-text-muted); transition:all 0.15s; }
.year-nav-btn:active { background:var(--color-primary-ghost); color:var(--color-primary); }
.year-nav-label { font-size:0.88rem; font-weight:700; min-width:52px; text-align:center; }
.custom-range { display:none; align-items:center; gap:var(--space-2); margin-bottom:var(--space-4); flex-wrap:wrap; }
.custom-range.active { display:flex; }
.custom-range input[type="date"] { padding:6px 10px; border:1px solid var(--color-border); border-radius:var(--radius-sm); font-size:0.82rem; font-family:var(--font-sans); background:var(--color-surface); }

/* ---- Category Ranking ---- */
.ranking-list { display:flex; flex-direction:column; gap:10px; padding:4px 0; }
.ranking-item { display:flex; align-items:center; gap:var(--space-2); }
.ranking-item .rank-emoji { font-size:0.95rem; width:22px; text-align:center; flex-shrink:0; }
.ranking-item .rank-name { font-size:0.78rem; width:64px; flex-shrink:0; color:var(--color-text-secondary); font-weight:450; }
.ranking-item .rank-amount { font-size:0.78rem; font-family:var(--font-mono); font-variant-numeric:tabular-nums; width:64px; text-align:right; flex-shrink:0; font-weight:550; letter-spacing:-0.02em; }
.ranking-item .rank-pct { font-size:0.72rem; color:var(--color-text-muted); width:38px; text-align:right; flex-shrink:0; }
.ranking-bar-wrap { flex:1; height:6px; background:var(--color-divider); border-radius:var(--radius-full); overflow:hidden; }
.ranking-bar-fill { height:100%; border-radius:var(--radius-full); transition:width 0.6s var(--ease-spring); }

/* ---- TOP 10 Table ---- */
.top10-table { width:100%; border-collapse:collapse; font-size:0.84rem; }
.top10-table th { text-align:left; padding:8px var(--space-3); color:var(--color-text-muted); font-weight:500; font-size:0.72rem; border-bottom:1px solid var(--color-border); }
.top10-table td { padding:10px var(--space-3); border-bottom:1px solid var(--color-divider); vertical-align:middle; }
.top10-table tr:last-child td { border-bottom:none; }
.top10-rank { width:26px; height:26px; border-radius:var(--radius-full); display:inline-flex; align-items:center; justify-content:center; font-size:0.72rem; font-weight:700; color:#fff; }
.top10-rank.r1 { background:#E8A250; } .top10-rank.r2 { background:#B0A89E; } .top10-rank.r3 { background:#C8966A; } .top10-rank.rn { background:var(--color-divider); color:var(--color-text-muted); }
.top10-amount { font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-weight:600; letter-spacing:-0.02em; }

/* ---- Charts ---- */
.chart-container { background:var(--color-surface); border-radius:var(--radius-lg); padding:var(--space-5); margin-bottom:var(--space-4); box-shadow:var(--shadow-xs); }
.chart-container canvas { max-height:280px; }
.chart-container .chart-title { font-size:0.82rem; font-weight:600; color:var(--color-text-secondary); margin-bottom:var(--space-4); }
.charts-row { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-4); }

/* ---- Balance Card (银行卡 total) ---- */
.balance-card {
  background: linear-gradient(135deg, #5B9CF5 0%, #7DB8F8 100%);
  border-radius: var(--radius-lg); padding: var(--space-5) var(--space-6);
  margin-bottom: var(--space-4); color: #fff; text-align: center;
  box-shadow: 0 4px 16px rgba(91,156,245,0.25);
}
.balance-card .bal-label { font-size:0.76rem; opacity:0.85; margin-bottom:var(--space-1); font-weight:500; }
.balance-card .bal-amount { font-size:2rem; font-weight:800; font-family:var(--font-mono); font-variant-numeric:tabular-nums; letter-spacing:-0.03em; }
.balance-card .bal-sub { font-size:0.74rem; opacity:0.75; margin-top:var(--space-2); }

/* ---- Asset Section ---- */
.asset-section { margin-bottom: var(--space-5); }
.asset-section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--space-3);
}
.asset-section-header .asset-section-title { font-size:0.88rem; font-weight:600; color:var(--color-text); }
.asset-section-header .asset-section-total { font-size:0.78rem; color:var(--color-text-muted); font-family:var(--font-mono); font-variant-numeric:tabular-nums; }
.header-add-btn {
  width: 34px; height: 34px; border: 2px solid var(--color-border);
  border-radius: var(--radius-full); background: var(--color-surface);
  color: var(--color-text-secondary); font-size: 1.3rem; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0; line-height: 1;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.header-add-btn:active { border-color: var(--color-primary); color: var(--color-primary); background: var(--color-primary-bg); transform: scale(0.92); }

/* Bank card item */
.bank-card-item {
  background: var(--color-surface);
  border-radius: var(--radius-md);
  padding: var(--space-4);
  margin-bottom: var(--space-2);
  box-shadow: var(--shadow-xs);
  display: flex; align-items: center; gap: var(--space-3);
  transition: all 0.2s var(--ease-out);
}
.bank-card-item .card-type-icon {
  width: 40px; height: 40px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; flex-shrink: 0;
}
.bank-card-item .card-type-icon.debit { background: #EEF2FF; }
.bank-card-item .card-type-icon.credit { background: #FEF5F5; }
.bank-card-item .card-info { flex:1; min-width:0; }
.bank-card-item .card-name { font-size:0.9rem; font-weight:550; }
.bank-card-item .card-meta { font-size:0.72rem; color:var(--color-text-muted); display:flex; gap:8px; }
.bank-card-item .card-balance {
  font-size:1rem; font-weight:700; font-family:var(--font-mono);
  font-variant-numeric:tabular-nums; flex-shrink:0; text-align:right; letter-spacing:-0.02em;
  cursor: pointer; padding:4px 8px; border-radius:var(--radius-sm); transition:background 0.15s;
}
.bank-card-item .card-balance:hover { background:var(--color-bg); }
.bank-card-item .card-balance.debit { color:var(--color-text); }
.bank-card-item .card-balance.credit { color:var(--color-danger); }
.bank-card-item .card-actions { display:flex; gap:1px; flex-shrink:0; }
.bank-card-item .btn-icon { width:28px; height:28px; border:none; border-radius:var(--radius-sm); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:0.75rem; color:var(--color-text-muted); transition:all 0.15s; }
.bank-card-item .btn-icon:active { background:var(--color-bg); }
.bank-card-item .btn-icon.delete:active { background:var(--color-danger-bg); color:var(--color-danger); }

/* Inline add form */
.inline-add-btn {
  width: 100%; padding: 16px; border: 2px dashed var(--color-border);
  border-radius: var(--radius-md); background: transparent;
  color: var(--color-text-muted); font-size:0.92rem; font-family:var(--font-sans);
  font-weight: 500; cursor: pointer; transition: all 0.2s; margin-bottom: var(--space-2);
  min-height: 56px; -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.inline-add-btn:active { border-color:var(--color-primary-light); color:var(--color-primary); background:var(--color-primary-bg); }
.inline-form {
  background: var(--color-surface); border-radius: var(--radius-md);
  padding: var(--space-4); margin-bottom: var(--space-2);
  box-shadow: var(--shadow-sm); display: none; flex-wrap: wrap; gap: var(--space-2); align-items: flex-end;
}
.inline-form.active { display: flex; }
.inline-form input, .inline-form select {
  padding: 8px 10px; border:1px solid var(--color-border);
  border-radius: var(--radius-sm); font-size:0.82rem; font-family:var(--font-sans);
  background: var(--color-bg);
}
.inline-form input[type="number"] { font-family:var(--font-mono); width:110px; }
.inline-form .btn-sm { padding:8px 14px; border:none; border-radius:var(--radius-sm); font-size:0.8rem; font-family:var(--font-sans); cursor:pointer; font-weight:500; }
.inline-form .btn-sm.primary { background:var(--color-primary); color:#fff; }
.inline-form .btn-sm.ghost { background:transparent; color:var(--color-text-muted); }

/* ---- Investment Card ---- */
.invest-card {
  background: var(--color-surface); border-radius: var(--radius-lg);
  padding: var(--space-5); margin-bottom: var(--space-3);
  box-shadow: var(--shadow-sm);
}
.invest-card .inv-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: var(--space-4); flex-wrap: wrap; gap: var(--space-2);
}
.invest-card .inv-name { font-size:1rem; font-weight:700; }
.invest-card .inv-type { font-size:0.72rem; color:var(--color-text-muted); }
.invest-card .inv-stats {
  display: grid; grid-template-columns: repeat(3,1fr); gap: var(--space-3);
  text-align: center; margin-bottom: var(--space-3);
}
.invest-stat .inv-stat-value { font-size:1.1rem; font-weight:700; font-family:var(--font-mono); font-variant-numeric:tabular-nums; letter-spacing:-0.02em; }
.invest-stat .inv-stat-label { font-size:0.7rem; color:var(--color-text-muted); margin-top:2px; }
.invest-stat.profit .inv-stat-value { color:var(--color-success); }
.invest-stat.loss .inv-stat-value { color:var(--color-danger); }
.invest-card .inv-detail {
  background: var(--color-bg); border-radius: var(--radius-sm);
  padding: var(--space-3); font-size:0.78rem; color:var(--color-text-secondary);
  margin-bottom: var(--space-3); line-height:1.8;
}
.invest-card .inv-detail strong { color:var(--color-text); }
.invest-card .inv-actions { display:flex; gap:var(--space-2); flex-wrap:wrap; }
.invest-card .inv-sold-badge {
  display: inline-block; background: var(--color-success-bg); color: var(--color-success);
  font-size:0.75rem; font-weight:600; padding:4px 10px; border-radius:var(--radius-full);
}
.invest-card.sold { border-left: 3px solid var(--color-success); }

/* ---- ROI Card ---- */
.roi-card {
  background: var(--color-surface); border-radius: var(--radius-lg);
  padding: var(--space-5); margin-bottom: var(--space-3);
  box-shadow: var(--shadow-sm); overflow: hidden; position: relative;
}
.roi-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:var(--space-3); flex-wrap:wrap; gap:var(--space-2); }
.roi-card-name { font-size:1rem; font-weight:700; }
.roi-card-meta { font-size:0.72rem; color:var(--color-text-muted); }
.roi-card-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:var(--space-3); text-align:center; margin:var(--space-4) 0; }
.roi-stat .roi-stat-value { font-size:1.1rem; font-weight:700; font-family:var(--font-mono); font-variant-numeric:tabular-nums; letter-spacing:-0.02em; }
.roi-stat .roi-stat-label { font-size:0.7rem; color:var(--color-text-muted); margin-top:2px; }
.roi-stat.warning .roi-stat-value { color:var(--color-danger); }
.roi-stat.success .roi-stat-value { color:var(--color-success); }
.roi-progress-wrap { margin-bottom:var(--space-4); }
.roi-progress-info { display:flex; justify-content:space-between; font-size:0.72rem; color:var(--color-text-muted); margin-bottom:6px; }
.roi-progress-bar { width:100%; height:8px; background:var(--color-divider); border-radius:var(--radius-full); overflow:hidden; position:relative; }
.roi-progress-fill { height:100%; border-radius:var(--radius-full); transition:width 0.5s var(--ease-spring); }
.roi-progress-target { position:absolute; top:-3px; width:4px; height:14px; background:var(--color-primary); border-radius:2px; }
.roi-card-actions { display:flex; gap:var(--space-2); flex-wrap:wrap; }
.roi-use-btn { flex:1; padding:13px; border:none; border-radius:var(--radius-md); background:var(--color-primary); color:#fff; font-size:0.92rem; font-weight:600; font-family:var(--font-sans); cursor:pointer; transition:all 0.2s var(--ease-out); min-height:46px; box-shadow:0 2px 10px rgba(232,115,90,0.2); }
.roi-use-btn:active { transform:scale(0.96); }
.roi-use-btn.used { background:var(--color-success); box-shadow:0 2px 10px rgba(91,170,106,0.3); animation:pulse 0.45s var(--ease-spring); }
@keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.04);} }

.roi-form { background:var(--color-surface); border-radius:var(--radius-lg); padding:var(--space-5); box-shadow:var(--shadow-sm); }
.roi-form-row { display:flex; gap:var(--space-2); align-items:center; margin-bottom:var(--space-3); flex-wrap:wrap; }
.roi-form-row label { font-size:0.78rem; color:var(--color-text-secondary); white-space:nowrap; font-weight:500; }
.roi-form-row input, .roi-form-row select { padding:7px 10px; border:1px solid var(--color-border); border-radius:var(--radius-sm); font-size:0.82rem; font-family:var(--font-sans); background:var(--color-bg); }

/* ---- Buttons ---- */
.btn-sm-outline { padding:8px 14px; border:1px solid var(--color-border); border-radius:var(--radius-sm); background:var(--color-surface); font-size:0.78rem; font-family:var(--font-sans); cursor:pointer; color:var(--color-text-secondary); transition:all 0.15s; }
.btn-sm-outline:active { border-color:var(--color-primary-light); color:var(--color-primary); background:var(--color-primary-bg); }
.btn-sm-outline.danger:active { border-color:var(--color-danger); color:var(--color-danger); background:var(--color-danger-bg); }
.btn-sell { padding:8px 14px; border:1px solid var(--color-income); border-radius:var(--radius-sm); background:var(--color-income-bg); font-size:0.78rem; font-family:var(--font-sans); cursor:pointer; color:var(--color-income); font-weight:600; transition:all 0.15s; }
.btn-sell:active { background:var(--color-income); color:#fff; }

/* ---- Search & Filter ---- */
.search-bar { display:flex; gap:var(--space-2); margin-bottom:var(--space-4); flex-wrap:wrap; align-items:center; }
.search-bar input, .search-bar select { padding:9px 12px; border:1px solid var(--color-border); border-radius:var(--radius-sm); font-size:0.82rem; font-family:var(--font-sans); background:var(--color-surface); color:var(--color-text); outline:none; }
.search-bar input:focus, .search-bar select:focus { border-color:var(--color-primary-light); }
.search-bar input { flex:1; min-width:120px; }
.search-bar input::placeholder { color:var(--color-text-ghost); }
.search-bar select { min-width:90px; }

/* Pagination */
.pagination { display:flex; justify-content:center; gap:4px; margin-top:var(--space-5); }
.page-btn { width:34px; height:34px; border:1px solid var(--color-border); border-radius:var(--radius-sm); background:var(--color-surface); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:0.82rem; font-family:var(--font-sans); color:var(--color-text-secondary); transition:all 0.15s; user-select:none; }
.page-btn:active { border-color:var(--color-primary); color:var(--color-primary); }
.page-btn.active { background:var(--color-primary); color:#fff; border-color:var(--color-primary); }
.page-btn:disabled { opacity:0.3; cursor:default; }

/* Onboarding & Export */
.onboarding-tip { background:var(--color-primary-bg); border-radius:var(--radius-md); padding:var(--space-4); text-align:center; font-size:0.85rem; color:var(--color-primary-dark); margin-bottom:var(--space-4); }
.export-btn { padding:10px 24px; border:1px solid var(--color-primary-light); border-radius:var(--radius-md); background:var(--color-surface); color:var(--color-primary); font-size:0.88rem; font-family:var(--font-sans); cursor:pointer; font-weight:500; transition:all 0.15s; min-height:44px; user-select:none; }
.export-btn:active { background:var(--color-primary-bg); }

/* ---- Responsive ---- */
@media (max-width: 640px) {
  .category-grid { grid-template-columns:repeat(4,1fr); gap:6px; }
  .category-chip { padding:8px 2px; min-height:54px; }
  .category-chip .emoji { font-size:1.15rem; }
  .category-chip .name { font-size:0.62rem; }
  .summary-card { grid-template-columns:repeat(3,1fr); gap:var(--space-2); padding:var(--space-4); }
  .summary-card .summary-stat:nth-child(4), .summary-card .summary-stat:nth-child(5) { margin-top:var(--space-2); }
  .summary-stat .stat-value { font-size:0.9rem; }
  .charts-row { grid-template-columns:1fr; }
  .period-pill { padding:6px 12px; font-size:0.74rem; min-height:32px; }
  .quick-amounts { gap:6px; }
  .quick-amount-btn { padding:7px 13px; font-size:0.76rem; }
  .amount-input-wrap input { font-size:1.4rem; }
  .search-bar input { min-width:80px; }
  #toast-container { bottom:120px; }
  .record-item .record-actions { opacity:0.6; }
  .balance-card .bal-amount { font-size:1.6rem; }
  .invest-card .inv-stats { grid-template-columns:repeat(3,1fr); gap:var(--space-2); }
  .type-toggle-btn { font-size:0.82rem; padding:8px 12px; }
}
@media (min-width: 768px) {
  #tab-content { padding:var(--space-6) var(--space-8); }
  .quick-add { padding:var(--space-6); }
  .category-grid { gap:var(--space-3); }
  .category-chip { min-height:68px; }
  .category-chip .emoji { font-size:1.45rem; }
  .category-chip .name { font-size:0.76rem; }
  .charts-row { grid-template-columns:1fr 1fr; }
  .amount-input-wrap input { font-size:1.8rem; }
}
.hidden { display:none !important; }
</style>
</head>
<body>
<div id="app">
  <header id="app-header">
    <span class="title">💰 记账本</span>
    <div class="header-stats">
      <div class="header-stat"><div class="h-label">本月支出</div><div class="h-amount" id="header-expense">¥0</div></div>
      <div class="header-stat"><div class="h-label">本月收入</div><div class="h-amount" id="header-income" style="color:#A8F0C0">¥0</div></div>
      <div class="header-stat"><div class="h-label">本月净额</div><div class="h-amount" id="header-net">¥0</div></div>
    </div>
  </header>

  <nav id="tab-nav">
    <button class="tab-btn active" data-tab="record">📝 记账</button>
    <button class="tab-btn" data-tab="summary">📊 汇总</button>
    <button class="tab-btn" data-tab="cards">💳 银行卡</button>
    <button class="tab-btn" data-tab="invest">📈 理财</button>
    <button class="tab-btn" data-tab="roi">🔄 回本</button>
    <button class="tab-btn" data-tab="all-records">📋 记录</button>
  </nav>

  <main id="tab-content">
    <!-- ===== Tab 1: 记账 ===== -->
    <section id="tab-record" class="tab-panel active">
      <div id="onboarding-hint"></div>
      <div id="quick-add-container"></div>
      <div id="record-summary-card"></div>
      <div class="section-title">最近记录</div>
      <div id="recent-records" class="record-list"></div>
    </section>

    <!-- ===== Tab 2: 汇总分析 ===== -->
    <section id="tab-summary" class="tab-panel">
      <div id="summary-period-selector"></div>
      <div id="summary-custom-range" class="custom-range">
        <span style="font-size:0.82rem;color:var(--color-text-muted)">从</span>
        <input type="date" id="custom-start">
        <span style="font-size:0.82rem;color:var(--color-text-muted)">至</span>
        <input type="date" id="custom-end">
        <button class="btn-sm-outline" id="apply-custom-range">应用</button>
      </div>
      <div class="summary-type-toggle" id="summary-type-toggle">
        <button class="summary-type-pill active" data-stype="expense">💸 支出分析</button>
        <button class="summary-type-pill" data-stype="income">💰 收入分析</button>
      </div>
      <div id="summary-stats"></div>
      <div class="charts-row">
        <div class="chart-container"><div class="chart-title" id="pie-title">分类占比</div><canvas id="summary-pie"></canvas></div>
        <div class="chart-container"><div class="chart-title">分类排名</div><div id="category-ranking" class="ranking-list"></div></div>
      </div>
      <div class="chart-container"><div class="chart-title" id="trend-title">支出趋势</div><canvas id="summary-trend"></canvas></div>
      <div class="chart-container">
        <div class="chart-title" id="top10-title">TOP 10 大额支出</div>
        <div style="overflow-x:auto"><table class="top10-table"><thead><tr><th>#</th><th>日期</th><th>分类</th><th>金额</th><th>备注</th></tr></thead><tbody id="top10-body"></tbody></table></div>
        <div id="top10-empty" class="empty-state" style="display:none"><div class="empty-icon">📭</div><div class="empty-text">暂无记录</div></div>
      </div>
      <div style="text-align:center;margin-top:var(--space-5)"><button class="export-btn" id="export-csv-btn">📥 导出 CSV</button></div>
    </section>

    <!-- ===== Tab 3: 银行卡 ===== -->
    <section id="tab-cards" class="tab-panel">
      <div id="card-balance-overview"></div>
      <div class="asset-section">
        <div class="asset-section-header">
          <span class="asset-section-title">💳 我的银行卡</span>
          <div style="display:flex;align-items:center;gap:var(--space-2)">
            <span class="asset-section-total" id="card-total-label"></span>
            <button class="header-add-btn" id="add-card-btn" title="添加银行卡">+</button>
          </div>
        </div>
        <div class="inline-form" id="card-form">
          <input type="text" id="card-name" placeholder="卡名" style="width:120px">
          <input type="text" id="card-bank" placeholder="银行" style="width:100px">
          <select id="card-type"><option value="debit">储蓄卡</option><option value="credit">信用卡</option></select>
          <input type="number" id="card-balance" placeholder="余额" step="0.01" style="width:100px">
          <input type="text" id="card-note" placeholder="备注" style="width:80px">
          <button class="btn-sm primary" id="card-save">保存</button>
          <button class="btn-sm ghost" id="card-cancel">取消</button>
        </div>
        <div id="bank-card-list"></div>
      </div>
    </section>

    <!-- ===== Tab 4: 理财 ===== -->
    <section id="tab-invest" class="tab-panel">
      <div id="invest-overview"></div>
      <div class="asset-section">
        <div class="asset-section-header">
          <span class="asset-section-title">📈 持仓中</span>
          <div style="display:flex;align-items:center;gap:var(--space-2)">
            <span class="asset-section-total" id="active-invest-total"></span>
            <button class="header-add-btn" id="add-invest-btn" title="添加理财">+</button>
          </div>
        </div>
        <div class="inline-form" id="invest-form">
          <input type="text" id="inv-name" placeholder="名称" style="width:110px">
          <select id="inv-type"><option value="fund">基金</option><option value="stock">股票</option><option value="deposit">定期</option><option value="other">其他</option></select>
          <input type="number" id="inv-principal" placeholder="初始本金" step="0.01" style="width:100px">
          <input type="number" id="inv-current" placeholder="当前市值" step="0.01" style="width:100px">
          <input type="number" id="inv-daily" placeholder="每日定投" step="0.01" style="width:90px">
          <input type="date" id="inv-start" style="width:120px">
          <button class="btn-sm primary" id="inv-save">保存</button>
          <button class="btn-sm ghost" id="inv-cancel">取消</button>
        </div>
        <div id="active-invest-list"></div>
      </div>
      <div class="asset-section">
        <div class="asset-section-header">
          <span class="asset-section-title">💰 已落袋为安</span>
          <span class="asset-section-total" id="sold-invest-total"></span>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
/* ============================================================
   CATEGORIES
   ============================================================ */
const EXPENSE_CATEGORIES = [
  { key:'餐饮伙食', emoji:'🍜', color:'#F08C5A', bg:'#FFF6F0' },
  { key:'居住住房', emoji:'🏠', color:'#7B75F0', bg:'#F2F1FE' },
  { key:'水电通讯', emoji:'💡', color:'#3DB8A8', bg:'#F0FAF8' },
  { key:'交通出行', emoji:'🚇', color:'#9B8DF5', bg:'#F7F5FF' },
  { key:'日常用品', emoji:'🧹', color:'#8EC63F', bg:'#F6FAF0' },
  { key:'服饰穿搭', emoji:'👔', color:'#F062A0', bg:'#FEF5F8' },
  { key:'数码娱乐', emoji:'🎮', color:'#F06060', bg:'#FEF5F5' },
  { key:'旅游度假', emoji:'✈️', color:'#3CC0D6', bg:'#F0FAFC' },
  { key:'医疗健康', emoji:'💊', color:'#3DBE8A', bg:'#F0FAF5' },
  { key:'人情社交', emoji:'🎁', color:'#F5A623', bg:'#FFFBF2' },
  { key:'学习成长', emoji:'📚', color:'#5B9CF5', bg:'#F2F7FE' },
  { key:'其他杂项', emoji:'📦', color:'#8C8279', bg:'#F8F7F5' },
];

const INCOME_CATEGORIES = [
  { key:'工资收入', emoji:'💰', color:'#2E9E5F', bg:'#EDF8F2' },
  { key:'奖金', emoji:'🎁', color:'#E8A250', bg:'#FFFBF2' },
  { key:'理财收益', emoji:'📈', color:'#3DB8A8', bg:'#F0FAF8' },
  { key:'兼职', emoji:'💼', color:'#5B9CF5', bg:'#F2F7FE' },
  { key:'退款', emoji:'🔄', color:'#9B8DF5', bg:'#F7F5FF' },
  { key:'其他收入', emoji:'📦', color:'#8C8279', bg:'#F8F7F5' },
];

const ALL_CATEGORIES = [...EXPENSE_CATEGORIES, ...INCOME_CATEGORIES];
const CAT_MAP = {}; ALL_CATEGORIES.forEach(c => { CAT_MAP[c.key] = c; });

/* ============================================================
   HELPERS
   ============================================================ */
function escapeHtml(str) { const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }
function formatAmount(n) { return '¥' + Number(n).toFixed(2); }
function formatMoney(n) { const abs=Math.abs(n); const s=Number(abs).toFixed(2); return (n<0?'-':'')+'¥'+s; }
function generateId() { return Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,8); }
function getCat(k) { return CAT_MAP[k] || CAT_MAP['其他杂项']; }

/* ============================================================
   DATA STORE
   ============================================================ */
const DataStore = {
  _cache: null,
  load() {
    if (!this._cache) {
      const raw = localStorage.getItem('finance_data');
      if (raw) { try { this._cache = JSON.parse(raw); } catch(e) { this._cache = null; } }
      if (!this._cache) {
        this._cache = { version:4, records:[], roi_items:[], bank_cards:[], investments:[],
          settings:{ quickAmounts:[10,20,50,100,200,500], lastCategory:'餐饮伙食', recordType:'expense' } };
      }
      // Migrations
      if (!this._cache.version || this._cache.version<2) {
        if (!this._cache.roi_items) this._cache.roi_items = [];
        if (!this._cache.settings) this._cache.settings = { quickAmounts:[10,20,50,100,200,500], lastCategory:'餐饮伙食', recordType:'expense' };
        const m = { '饮食':'餐饮伙食','买衣服':'服饰穿搭','买包包':'服饰穿搭','Switch2':'数码娱乐','游戏卡带':'数码娱乐','房租':'居住住房','水电燃气':'水电通讯','清洁用品':'日常用品','旅游':'旅游度假','其他':'其他杂项' };
        this._cache.records.forEach(r => { if (m[r.category]) r.category = m[r.category]; });
        this._cache.version = 2;
      }
      if (this._cache.version < 3) {
        if (!this._cache.bank_cards) this._cache.bank_cards = [];
        if (!this._cache.investments) this._cache.investments = [];
        this._cache.version = 3;
      }
      if (this._cache.version < 4) {
        this._cache.records.forEach(r => { if (!r.type) r.type = 'expense'; });
        this._cache.investments.forEach(inv => {
          if (!inv.status) inv.status = 'active';
          if (!inv.soldAmount && inv.soldAmount !== 0) inv.soldAmount = null;
          if (!inv.soldDate) inv.soldDate = null;
          if (!inv.realizedProfit && inv.realizedProfit !== 0) inv.realizedProfit = null;
        });
        if (!this._cache.settings.recordType) this._cache.settings.recordType = 'expense';
        this._cache.version = 4;
      }
      this.save();
    }
    return this._cache;
  },
  save() { localStorage.setItem('finance_data', JSON.stringify(this._cache)); },
  addRecord(r) { this.load().records.push(r); this.save(); },
  updateRecord(id, u) { const d=this.load(); const i=d.records.findIndex(r=>r.id===id); if(i>=0){d.records[i]={...d.records[i],...u};this.save();} },
  deleteRecord(id) { const d=this.load(); d.records=d.records.filter(r=>r.id!==id); this.save(); },
  getRecords(f) {
    const d=this.load(); let rs=[...d.records];
    if(f){
      if(f.startDate) rs=rs.filter(r=>r.date>=f.startDate);
      if(f.endDate) rs=rs.filter(r=>r.date<=f.endDate);
      if(f.category) rs=rs.filter(r=>r.category===f.category);
      if(f.type) rs=rs.filter(r=>r.type===f.type);
      if(f.year) rs=rs.filter(r=>r.date.startsWith(String(f.year)));
      if(f.noteSearch){const q=f.noteSearch.toLowerCase();rs=rs.filter(r=>(r.note||'').toLowerCase().includes(q)||r.category.toLowerCase().includes(q));}
    }
    rs.sort((a,b)=>b.date.localeCompare(a.date)||b.createdAt.localeCompare(a.createdAt)); return rs;
  },
  getRecordById(id) { return this.load().records.find(r=>r.id===id); },
  invalidateCache() { this._cache=null; },

  // ROI
  addRoiItem(r) { this.load().roi_items.push(r); this.save(); },
  updateRoiItem(id,u) { const d=this.load(); const i=d.roi_items.findIndex(r=>r.id===id); if(i>=0){d.roi_items[i]={...d.roi_items[i],...u};this.save();} },
  deleteRoiItem(id) { const d=this.load(); d.roi_items=d.roi_items.filter(r=>r.id!==id); this.save(); },
  getRoiItems() { return [...this.load().roi_items]; },

  // Bank Cards
  addCard(c) { this.load().bank_cards.push(c); this.save(); },
  updateCard(id,u) { const d=this.load(); const i=d.bank_cards.findIndex(c=>c.id===id); if(i>=0){d.bank_cards[i]={...d.bank_cards[i],...u};this.save();} },
  deleteCard(id) { const d=this.load(); d.bank_cards=d.bank_cards.filter(c=>c.id!==id); this.save(); },
  getCards() { return [...this.load().bank_cards]; },

  // Investments
  addInvestment(inv) { this.load().investments.push(inv); this.save(); },
  updateInvestment(id,u) { const d=this.load(); const i=d.investments.findIndex(inv=>inv.id===id); if(i>=0){d.investments[i]={...d.investments[i],...u};this.save();} },
  deleteInvestment(id) { const d=this.load(); d.investments=d.investments.filter(inv=>inv.id!==id); this.save(); },
  getInvestments() { return [...this.load().investments]; }
};

/* ============================================================
   DATE UTILS
   ============================================================ */
const DateUtils = {
  today() { return new Date().toISOString().slice(0,10); },
  nowISO() { return new Date().toISOString(); },
  formatDisplay(ds) { const d=new Date(ds+'T00:00:00'); const wd=['日','一','二','三','四','五','六']; return (d.getMonth()+1)+'月'+d.getDate()+'日 周'+wd[d.getDay()]; },
  getMonthRange(y,m) { const sm=String(m).padStart(2,'0'); return {start:`${y}-${sm}-01`,end:`${y}-${sm}-${String(new Date(y,m,0).getDate()).padStart(2,'0')}`}; },
  getQuarterRange(y,q) { const sm=(q-1)*3+1,em=sm+2; return {start:`${y}-${String(sm).padStart(2,'0')}-01`,end:`${y}-${String(em).padStart(2,'0')}-${String(new Date(y,em,0).getDate()).padStart(2,'0')}`,label:`${y}年Q${q}`}; },
  getSemiAnnualRange(y,h) { return h===1?{start:`${y}-01-01`,end:`${y}-06-30`,label:`${y}年上半年`}:{start:`${y}-07-01`,end:`${y}-12-31`,label:`${y}年下半年`}; },
  getYearRange(y) { return {start:`${y}-01-01`,end:`${y}-12-31`,label:`${y}年`}; },
  getAvailableYears() { const ys=new Set(); DataStore.getRecords().forEach(r=>ys.add(parseInt(r.date.slice(0,4)))); ys.add(new Date().getFullYear()); return [...ys].sort((a,b)=>b-a); },
  daysBetween(s,e) { return Math.ceil((new Date(e+'T00:00:00')-new Date(s+'T00:00:00'))/(86400000))+1; }
};

/* ============================================================
   CALCULATOR
   ============================================================ */
const Calculator = {
  getPeriodTotal(s,e,type) { return DataStore.getRecords({startDate:s,endDate:e,type:type||undefined}).reduce((a,r)=>a+r.amount,0); },
  getCategoryBreakdown(s,e,type) { const rs=DataStore.getRecords({startDate:s,endDate:e,type:type||undefined}); const bd={}; const cats = type==='income'?INCOME_CATEGORIES:EXPENSE_CATEGORIES; cats.forEach(c=>bd[c.key]=0); rs.forEach(r=>{ if((type?r.type===type:true)) bd[r.category]=(bd[r.category]||0)+r.amount; }); return bd; },
  getMonthlyTotals(y,type) { const t=[]; for(let m=1;m<=12;m++){const r=DateUtils.getMonthRange(y,m);t.push(this.getPeriodTotal(r.start,r.end,type));} return t; },
  getDailyTotals(s,e,type) { const rs=DataStore.getRecords({startDate:s,endDate:e,type:type||undefined}); const dm={}; rs.forEach(r=>{dm[r.date]=(dm[r.date]||0)+r.amount;}); const r=[]; for(let d=new Date(s+'T00:00:00');d<=new Date(e+'T00:00:00');d.setDate(d.getDate()+1)){const ds=d.toISOString().slice(0,10);r.push({date:ds,total:dm[ds]||0});} return r; },
  getWeeklyTotals(s,e,type) { const rs=DataStore.getRecords({startDate:s,endDate:e,type:type||undefined}); const wm={}; rs.forEach(r=>{const d=new Date(r.date+'T00:00:00');const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);const mon=new Date(d);mon.setDate(diff);const wk=mon.toISOString().slice(0,10);wm[wk]=(wm[wk]||0)+r.amount;}); const r=[]; const d0=new Date(s+'T00:00:00');const dd0=d0.getDay();const df0=d0.getDate()-dd0+(dd0===0?-6:1);const fm=new Date(d0);fm.setDate(df0); for(let d=new Date(fm);d<=new Date(e+'T00:00:00');d.setDate(d.getDate()+7)){const wk=d.toISOString().slice(0,10);r.push({week:wk,total:wm[wk]||0});} return r; },
  getTopCategory(s,e,type) { const bd=this.getCategoryBreakdown(s,e,type); let tc=null,ta=0; for(const[k,v]of Object.entries(bd)){if(v>ta){ta=v;tc=k;}} return tc?{category:tc,amount:ta,emoji:getCat(tc).emoji}:null; },
  getDailyAverage(s,e,type) { return this.getPeriodTotal(s,e,type)/Math.max(1,DateUtils.daysBetween(s,e)); },
  getRecordCount(s,e,type) { return DataStore.getRecords({startDate:s,endDate:e,type:type||undefined}).length; },
  getTopNRecords(n,s,e,type) { const rs=DataStore.getRecords({startDate:s,endDate:e,type:type||undefined}); return [...rs].sort((a,b)=>b.amount-a.amount).slice(0,n); }
};

/* ============================================================
   TOAST
   ============================================================ */
const Toast = {
  _c: null,
  init() { this._c = document.getElementById('toast-container'); },
  show(msg, opts={}) {
    const { undoCallback, duration=5000 } = opts;
    const el = document.createElement('div'); el.className = 'toast';
    let h = `<span>${escapeHtml(msg)}</span>`;
    if (undoCallback) h += `<button class="undo-btn">撤销</button>`;
    el.innerHTML = h; this._c.appendChild(el);
    const remove = () => { el.classList.add('out'); setTimeout(()=>{if(el.parentNode)el.remove();},250); };
    if (undoCallback) el.querySelector('.undo-btn').addEventListener('click', ()=>{ undoCallback(); remove(); });
    setTimeout(remove, duration);
  }
};

/* ============================================================
   QUICK ADD (with income/expense toggle)
   ============================================================ */
const QuickAdd = {
  selCat: null,
  selType: 'expense',
  init() {
    const ds = DataStore.load().settings;
    this.selType = ds.recordType || 'expense';
    const lc = ds.lastCategory || '餐饮伙食';
    const cats = this.selType === 'income' ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
    this.selCat = cats.find(c=>c.key===lc) ? lc : cats[0].key;
    this.render(); this.attachEvents();
  },
  getCats() { return this.selType === 'income' ? INCOME_CATEGORIES : EXPENSE_CATEGORIES; },
  render() {
    const ct=document.getElementById('quick-add-container'); const qa=DataStore.load().settings.quickAmounts; const today=DateUtils.today();
    const cats = this.getCats();
    let h='<div class="quick-add">';
    // Type toggle
    h+='<div class="type-toggle">';
    h+='<button class="type-toggle-btn expense'+(this.selType==='expense'?' active':'')+'" data-ctype="expense">💸 支出</button>';
    h+='<button class="type-toggle-btn income'+(this.selType==='income'?' active':'')+'" data-ctype="income">💰 收入</button>';
    h+='</div>';
    h+='<div class="date-row">📅 <input type="date" id="record-date" value="'+today+'" max="'+today+'"></div>';
    h+='<div class="amount-input-wrap"><span class="currency-symbol">¥</span><input type="text" id="record-amount" inputmode="decimal" placeholder="0.00" autocomplete="off"></div>';
    h+='<div class="quick-amounts">'; qa.forEach(a=>{h+='<button class="quick-amount-btn" data-amount="'+a+'">¥'+a+'</button>';}); h+='</div>';
    h+='<div class="category-grid">';
    cats.forEach(c=>{const sel=c.key===this.selCat?' selected':'';const ic=this.selType==='income'?' income-chip':'';h+='<div class="category-chip'+ic+sel+'" data-category="'+c.key+'"><span class="emoji">'+c.emoji+'</span><span class="name">'+c.key+'</span></div>';});
    h+='</div><input type="text" class="note-input" id="record-note" placeholder="备注（可选）">';
    h+='<button class="submit-btn'+(this.selType==='income'?' income-submit':'')+'" id="submit-record">'+(this.selType==='income'?'记一笔收入':'记一笔支出')+'</button></div>';
    ct.innerHTML=h;
  },
  attachEvents() {
    const ct=document.getElementById('quick-add-container');
    ct.addEventListener('click',e=>{
      // Type toggle
      const tb=e.target.closest('.type-toggle-btn');
      if(tb){ this.selType=tb.dataset.ctype; const cats=this.getCats(); this.selCat=cats[0].key; const d=DataStore.load(); d.settings.recordType=this.selType; d.settings.lastCategory=this.selCat; DataStore.save(); this.render(); this.attachEvents(); return; }
      // Quick amount
      const b=e.target.closest('.quick-amount-btn'); if(b){document.getElementById('record-amount').value=b.dataset.amount;document.getElementById('record-amount').focus();}
      // Category
      const ch=e.target.closest('.category-chip'); if(ch){ct.querySelectorAll('.category-chip').forEach(c=>c.classList.remove('selected'));ch.classList.add('selected');this.selCat=ch.dataset.category;const d=DataStore.load();d.settings.lastCategory=ch.dataset.category;DataStore.save();}
      // Submit
      if(e.target.closest('#submit-record')) this.submit();
    });
    const amt=document.getElementById('record-amount'); amt.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();this.submit();}});
    amt.addEventListener('input',e=>{let v=e.target.value.replace(/[^\d.]/g,'');const p=v.split('.');if(p.length>2)v=p[0]+'.'+p.slice(1).join('');if(p.length===2&&p[1].length>2)v=p[0]+'.'+p[1].slice(0,2);e.target.value=v;});
    document.getElementById('record-note').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();this.submit();}});
  },
  submit() {
    const as=document.getElementById('record-amount').value.trim(); const a=parseFloat(as);
    if(!as||isNaN(a)||a<=0){const el=document.getElementById('record-amount');el.focus();el.style.borderBottomColor='var(--color-danger)';setTimeout(()=>{el.style.borderBottomColor='';},1000);return;}
    const date=document.getElementById('record-date').value||DateUtils.today(); const note=document.getElementById('record-note').value.trim();
    const r={id:generateId(),date,type:this.selType,amount:Math.round(a*100)/100,category:this.selCat,note,createdAt:DateUtils.nowISO()};
    DataStore.addRecord(r); document.getElementById('record-amount').value='';document.getElementById('record-note').value='';document.getElementById('record-amount').focus();
    const label=this.selType==='income'?'收入':'支出';
    Toast.show(getCat(r.category).emoji+' '+r.category+' '+formatAmount(r.amount)+' '+label+'已记录',{undoCallback:()=>{DataStore.deleteRecord(r.id);App.refreshAll();}});
    App.refreshAll();
  }
};

/* ============================================================
   RECORD LIST
   ============================================================ */
const RecordList = {
  _att: new Set(),
  render(cid, records, showGroups) {
    const ct=document.getElementById(cid);
    if(!records.length){ct.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">暂无记录</div></div>';return;}
    if(showGroups){const g={};records.forEach(r=>{if(!g[r.date])g[r.date]=[];g[r.date].push(r);});let h='';for(const[date,items]of Object.entries(g)){const dtExp=items.filter(r=>r.type!=='income').reduce((s,r)=>s+r.amount,0);const dtInc=items.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);h+='<div class="date-group-header"><span>'+DateUtils.formatDisplay(date)+'</span><span class="day-total">'+(dtInc>0?'<span style="color:var(--color-income);margin-right:8px">+'+formatAmount(dtInc)+'</span>':'')+(dtExp>0?formatAmount(dtExp):'')+'</span></div>';items.forEach(r=>{h+=this._html(r);});}ct.innerHTML=h;}
    else{ct.innerHTML=records.map(r=>this._html(r)).join('');}
  },
  _html(r){
    const c=getCat(r.category); const isIncome=r.type==='income';
    return `<div class="record-item" data-record-id="${r.id}"><span class="record-type-badge ${isIncome?'income':'expense'}">${isIncome?'收入':'支出'}</span><div class="cat-icon" style="background:${c.bg}">${c.emoji}</div><div class="record-info"><div class="record-category">${escapeHtml(r.category)}</div><div class="record-meta"><span>${r.date}</span>${r.note?'<span>💬 '+escapeHtml(r.note)+'</span>':''}</div></div><div class="record-amount ${isIncome?'income':'expense'}">${isIncome?'+':'-'}${formatAmount(r.amount)}</div><div class="record-actions"><button class="btn-icon edit" data-action="edit" data-id="${r.id}">✎</button><button class="btn-icon delete" data-action="delete" data-id="${r.id}">✕</button></div><div class="edit-form"><input type="date" value="${r.date}" class="edit-date"><select class="edit-type"><option value="expense"${!isIncome?' selected':''}>支出</option><option value="income"${isIncome?' selected':''}>收入</option></select><input type="number" value="${r.amount}" step="0.01" min="0.01" class="edit-amount"><select class="edit-category">${ALL_CATEGORIES.map(c=>'<option value="'+c.key+'"'+(c.key===r.category?' selected':'')+'>'+c.emoji+' '+c.key+'</option>').join('')}</select><input type="text" value="${escapeHtml(r.note||'')}" placeholder="备注" class="edit-note"><button class="btn-sm save" data-action="save-edit" data-id="${r.id}">保存</button><button class="btn-sm cancel" data-action="cancel-edit" data-id="${r.id}">取消</button></div></div>`;
  },
  attach(cid) {
    if(this._att.has(cid))return; const ct=document.getElementById(cid); if(!ct)return;
    ct.addEventListener('click',e=>{
      const del=e.target.closest('[data-action="delete"]'); if(del){e.stopPropagation();const id=del.dataset.id;const r=DataStore.getRecordById(id);if(r){const item=del.closest('.record-item');item.classList.add('deleting');DataStore.deleteRecord(id);Toast.show('已删除 '+getCat(r.category).emoji+' '+r.category+' '+formatAmount(r.amount),{undoCallback:()=>{DataStore.addRecord(r);App.refreshAll();}});setTimeout(()=>App.refreshAll(),300);}return;}
      const ed=e.target.closest('[data-action="edit"]');if(ed){ed.closest('.record-item').classList.add('editing');return;}
      const sv=e.target.closest('[data-action="save-edit"]');if(sv){const id=sv.dataset.id;const it=sv.closest('.record-item');const d=it.querySelector('.edit-date').value;const a=parseFloat(it.querySelector('.edit-amount').value);const c=it.querySelector('.edit-category').value;const n=it.querySelector('.edit-note').value.trim();const tp=it.querySelector('.edit-type').value;if(!isNaN(a)&&a>0){DataStore.updateRecord(id,{date:d,type:tp,amount:Math.round(a*100)/100,category:c,note:n});App.refreshAll();}return;}
      const cn=e.target.closest('[data-action="cancel-edit"]');if(cn){App.refreshAll();}
    });
    this._att.add(cid);
  }
};

/* ============================================================
   CHARTS
   ============================================================ */
const Charts = {
  _inst:{},
  _destroy(id){if(this._inst[id]){this._inst[id].destroy();delete this._inst[id];}},
  renderDoughnut(cid,bd,center){
    this._destroy(cid); const cv=document.getElementById(cid); if(!cv)return;
    const ents = Object.entries(bd).filter(e => e[1] > 0);
    if (!ents.length) { this._empty(cv); return; }
    const lbs = ents.map(e => e[0]);
    const dt = ents.map(e => e[1]);
    const cls = lbs.map(k => getCat(k).color);
    const total = dt.reduce((a,b) => a+b, 0);
    var fontFamily = '';
    try { fontFamily = getComputedStyle(document.body).fontFamily; } catch(e) { fontFamily = 'sans-serif'; }
    this._inst[cid] = new Chart(cv.getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: lbs,
        datasets: [{ data: dt, backgroundColor: cls, borderWidth: 1.5, borderColor: '#fff', hoverBorderWidth: 2 }]
      },
      options: {
        responsive: true, maintainAspectRatio: true, cutout: '58%',
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              padding: 10, usePointStyle: true, pointStyleWidth: 7,
              font: { size: 10.5 },
              generateLabels: function(ch) {
                var ds = ch.data.datasets[0];
                return ch.data.labels.map(function(l, i) {
                  return { text: l+' '+formatAmount(ds.data[i]), fillStyle: ds.backgroundColor[i],
                    strokeStyle: ds.backgroundColor[i], lineWidth: 0, hidden: false,
                    index: i, pointStyle: 'circle', rotation: 0 };
                });
              }
            }
          },
          tooltip: {
            callbacks: { label: function(ctx) { return ' '+ctx.label+': '+formatAmount(ctx.parsed); } }
          }
        }
      },
      plugins: [{
        id: 'ct',
        afterDraw: function(ch) {
          var ca = ch.chartArea;
          var w = ca.width, h = ca.height, t = ca.top, l = ca.left;
          var ctx2 = ch.ctx;
          ctx2.save();
          ctx2.font = '600 15px ' + fontFamily;
          ctx2.fillStyle = '#1C1917';
          ctx2.textAlign = 'center';
          ctx2.textBaseline = 'middle';
          ctx2.fillText(formatAmount(total), l+w/2, t+h/2-5);
          ctx2.font = '10px ' + fontFamily;
          ctx2.fillStyle = '#A8A29E';
          ctx2.fillText(center||'总计', l+w/2, t+h/2+13);
          ctx2.restore();
        }
      }]
    });
  },
  renderBarChart(cid, lbs, dt, hi) {
    this._destroy(cid); const cv = document.getElementById(cid); if (!cv) return;
    if (!lbs.length) { this._empty(cv); return; }
    this._inst[cid] = new Chart(cv.getContext('2d'), {
      type: 'bar',
      data: {
        labels: lbs,
        datasets: [{
          data: dt,
          backgroundColor: dt.map(function(_, i) { return i === hi ? '#E8735A' : 'rgba(232,115,90,0.38)'; }),
          borderRadius: 4, borderSkipped: false, hoverBackgroundColor: '#D4654C'
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: function(ctx) { return ' '+formatAmount(ctx.parsed.y); } } }
        },
        scales: {
          y: { beginAtZero: true, ticks: { callback: function(v) { return '¥'+v; }, font: { size: 10 } },
            grid: { color: 'rgba(0,0,0,0.04)' } },
          x: { grid: { display: false }, ticks: { font: { size: 10 } } }
        }
      }
    });
  },
  _empty(cv){const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);ctx.font='13px var(--font-sans)';ctx.fillStyle='#A8A29E';ctx.textAlign='center';ctx.fillText('暂无数据',cv.width/2,cv.height/2);}
};
