/* ============================================================
   BANK CARDS MODULE
   ============================================================ */
const BankCards = {
  init() {
    this._initForm();
    this.render();
  },
  render() {
    this.renderOverview();
    this.renderCards();
  },
  renderOverview() {
    const cards = DataStore.getCards();
    const debitSum = cards.filter(c=>c.type==='debit').reduce((s,c)=>s+(c.balance||0),0);
    const creditSum = cards.filter(c=>c.type==='credit').reduce((s,c)=>s+Math.abs(c.balance||0),0);
    const totalBal = debitSum - creditSum;
    const cls = totalBal>=0?'positive':'negative';
    document.getElementById('card-balance-overview').innerHTML = `<div class="balance-card">
      <div class="bal-label">💳 银行卡总余额</div>
      <div class="bal-amount">${formatMoney(totalBal)}</div>
      <div class="bal-sub">储蓄 ¥${debitSum.toFixed(0)}  ${creditSum>0?'| 信用 ¥'+creditSum.toFixed(0):''}</div>
    </div>`;
  },
  renderCards() {
    const cards = DataStore.getCards().sort((a,b)=>(Math.abs(b.balance||0))-(Math.abs(a.balance||0)));
    const list = document.getElementById('bank-card-list');
    if (!cards.length) {
      list.innerHTML = '<div style="padding:var(--space-3) 0;font-size:0.82rem;color:var(--color-text-muted)">还没有添加银行卡</div>';
    } else {
      list.innerHTML = cards.map(c => this._cardHtml(c)).join('');
    }
    const debitSum = cards.filter(c=>c.type==='debit').reduce((s,c)=>s+(c.balance||0),0);
    const creditSum = cards.filter(c=>c.type==='credit').reduce((s,c)=>s+Math.abs(c.balance||0),0);
    document.getElementById('card-total-label').textContent =
      '储蓄 ¥'+debitSum.toFixed(0) + (creditSum>0?'  信用 ¥'+creditSum.toFixed(0):'');
    this._attachEvents();
  },
  _cardHtml(c) {
    const isDebit = c.type === 'debit';
    const icon = isDebit ? '💳' : '💎';
    const cls = isDebit ? 'debit' : 'credit';
    return `<div class="bank-card-item" data-card-id="${c.id}">
      <div class="card-type-icon ${cls}">${icon}</div>
      <div class="card-info">
        <div class="card-name">${escapeHtml(c.name)}</div>
        <div class="card-meta"><span>${escapeHtml(c.bank||'')}</span><span>${isDebit?'储蓄卡':'信用卡'}</span><span>更新: ${c.lastUpdated}</span></div>
      </div>
      <div class="card-balance ${cls}" data-action="edit-balance" data-id="${c.id}" title="点击修改余额">${formatMoney(c.balance)}</div>
      <div class="card-actions">
        <button class="btn-icon" data-action="edit-card" data-id="${c.id}">✎</button>
        <button class="btn-icon delete" data-action="delete-card" data-id="${c.id}">✕</button>
      </div>
    </div>`;
  },
  _attachEvents() {
    const list = document.getElementById('bank-card-list');
    list.onclick = (e) => {
      const eb = e.target.closest('[data-action="edit-balance"]');
      if (eb) {
        const id = eb.dataset.id; const card = DataStore.getCards().find(c=>c.id===id);
        if (card) { const v = prompt('修改余额 ('+card.name+'):', card.balance); if (v!==null) { const n = parseFloat(v); if (!isNaN(n)) { DataStore.updateCard(id, { balance: Math.round(n*100)/100, lastUpdated: DateUtils.today() }); this.render(); } } }
        return;
      }
      const del = e.target.closest('[data-action="delete-card"]');
      if (del) { const id = del.dataset.id; const card = DataStore.getCards().find(c=>c.id===id); if (card && confirm('删除 "'+card.name+'"？')) { DataStore.deleteCard(id); this.render(); } return; }
      const edit = e.target.closest('[data-action="edit-card"]');
      if (edit) {
        const id = edit.dataset.id; const card = DataStore.getCards().find(c=>c.id===id);
        if (card) {
          const name = prompt('卡名', card.name); if (name===null) return;
          const bank = prompt('银行', card.bank||''); if (bank===null) return;
          const type = confirm('是储蓄卡吗？\n"确定"=储蓄卡 "取消"=信用卡') ? 'debit' : 'credit';
          DataStore.updateCard(id, { name: name.trim(), bank: bank.trim(), type }); this.render();
        }
      }
    };
  },
  _initForm() {
    document.getElementById('add-card-btn').addEventListener('click', () => { document.getElementById('card-form').classList.toggle('active'); });
    document.getElementById('card-save').addEventListener('click', () => {
      const name = document.getElementById('card-name').value.trim();
      const balance = parseFloat(document.getElementById('card-balance').value);
      if (!name || isNaN(balance)) { Toast.show('请填写卡名和余额'); return; }
      DataStore.addCard({
        id: 'card-'+generateId(), name,
        bank: document.getElementById('card-bank').value.trim(),
        type: document.getElementById('card-type').value,
        balance: Math.round(balance*100)/100,
        lastUpdated: DateUtils.today(),
        note: document.getElementById('card-note').value.trim(),
        createdAt: DateUtils.nowISO()
      });
      document.getElementById('card-name').value = '';
      document.getElementById('card-bank').value = '';
      document.getElementById('card-balance').value = '';
      document.getElementById('card-note').value = '';
      document.getElementById('card-form').classList.remove('active');
      this.render(); Toast.show('✅ 已添加银行卡: '+name);
    });
    document.getElementById('card-cancel').addEventListener('click', () => { document.getElementById('card-form').classList.remove('active'); });
  }
};

/* ============================================================
   INVESTMENTS MODULE (with sell/lock-in-profit)
   ============================================================ */
const Investments = {
  init() {
    this._initForm();
    this.render();
  },
  render() {
    this.renderOverview();
    this.renderActive();
    this.renderSold();
  },

  renderOverview() {
    const invests = DataStore.getInvestments();
    const activeVal = invests.filter(inv=>inv.status!=='sold').reduce((s,inv)=>s+(inv.currentValue||0),0);
    const realizedProfit = invests.filter(inv=>inv.status==='sold').reduce((s,inv)=>s+(inv.realizedProfit||0),0);
    const totalWealth = activeVal + realizedProfit;
    document.getElementById('invest-overview').innerHTML = `<div class="balance-card" style="background:linear-gradient(135deg, #5BAA6A 0%, #7DC98A 100%); box-shadow:0 4px 16px rgba(91,170,106,0.25);">
      <div class="bal-label">📈 理财总览</div>
      <div class="bal-amount">${formatMoney(totalWealth)}</div>
      <div class="bal-sub">持仓 ¥${activeVal.toFixed(0)}  ${realizedProfit>0?'| 落袋 +¥'+realizedProfit.toFixed(0):''}</div>
    </div>`;
  },

  _calcTotalPrincipal(inv) {
    const initial = inv.principal || 0;
    const dailyAmt = inv.dailyAmount || 0;
    if (dailyAmt > 0 && inv.startDate) {
      const endDate = inv.soldDate || DateUtils.today();
      const days = Math.max(0, DateUtils.daysBetween(inv.startDate, endDate));
      return initial + dailyAmt * days;
    }
    return initial;
  },

  _investHtml(inv, isSold) {
    const typeMap = { fund:'基金', stock:'股票', deposit:'定期', other:'其他' };
    const typeLabel = typeMap[inv.type] || '其他';
    const initial = inv.principal || 0;
    const totalPrincipal = this._calcTotalPrincipal(inv);
    const currentVal = isSold ? (inv.soldAmount||totalPrincipal) : (inv.currentValue||totalPrincipal);
    const pnl = currentVal - totalPrincipal;
    const pnlPct = totalPrincipal > 0 ? ((pnl/totalPrincipal)*100).toFixed(1) : '0.0';
    const dailyAmt = inv.dailyAmount || 0;
    const endDate = isSold ? inv.soldDate : DateUtils.today();
    const days = inv.startDate ? Math.max(0, DateUtils.daysBetween(inv.startDate, endDate)) : 0;
    const profitCls = pnl >= 0 ? 'profit' : 'loss';

    const soldCls = isSold ? ' sold' : '';
    const realizedProfit = inv.realizedProfit || 0;

    let actionsHtml = '';
    if (isSold) {
      actionsHtml = `<span class="inv-sold-badge">✅ 已落袋 +${formatAmount(Math.abs(realizedProfit))}</span>
        <button class="btn-sm-outline danger" data-action="delete-invest" data-id="${inv.id}">删除</button>`;
    } else {
      actionsHtml = `<button class="btn-sm-outline" data-action="update-value" data-id="${inv.id}">📊 更新市值</button>
        <button class="btn-sm-outline" data-action="edit-invest" data-id="${inv.id}">✎ 编辑</button>
        <button class="btn-sell" data-action="sell-invest" data-id="${inv.id}">💰 卖出落袋</button>`;
    }

    return `<div class="invest-card${soldCls}" data-invest-id="${inv.id}">
      <div class="inv-header">
        <div><span class="inv-name">${escapeHtml(inv.name)}</span> <span class="inv-type">${typeLabel} · ${inv.startDate||'?'} 开始</span>${isSold?` <span class="inv-sold-badge" style="margin-left:6px">卖出: ${inv.soldDate}</span>`:''}</div>
        <button class="btn-icon delete" data-action="delete-invest" data-id="${inv.id}" style="width:28px;height:28px;">✕</button>
      </div>
      <div class="inv-stats">
        <div class="invest-stat"><div class="inv-stat-value">${formatAmount(totalPrincipal)}</div><div class="inv-stat-label">投入本金</div></div>
        <div class="invest-stat"><div class="inv-stat-value">${formatAmount(currentVal)}</div><div class="inv-stat-label">${isSold?'卖出金额':'当前市值'}</div></div>
        <div class="invest-stat ${profitCls}"><div class="inv-stat-value">${pnl>=0?'+':''}${formatAmount(Math.abs(pnl))}</div><div class="inv-stat-label">${isSold?'实现盈亏':'浮动盈亏'} (${pnl>=0?'+':''}${pnlPct}%)</div></div>
      </div>
      <div class="inv-detail">
        📅 每日定投 <strong>${formatAmount(dailyAmt)}</strong> &nbsp;·&nbsp;
        已投 <strong>${days}天</strong> &nbsp;·&nbsp;
        定投累计 <strong>${formatAmount(dailyAmt*days)}</strong> &nbsp;·&nbsp;
        初始本金 <strong>${formatAmount(initial)}</strong>
      </div>
      <div class="inv-actions">${actionsHtml}</div>
    </div>`;
  },

  renderActive() {
    const invests = DataStore.getInvestments().filter(inv=>inv.status!=='sold');
    const list = document.getElementById('active-invest-list');
    if (!invests.length) {
      list.innerHTML = '<div style="padding:var(--space-3) 0;font-size:0.82rem;color:var(--color-text-muted)">暂无持仓</div>';
    } else {
      invests.sort((a,b)=>(b.currentValue||0)-(a.currentValue||0));
      list.innerHTML = invests.map(inv => this._investHtml(inv, false)).join('');
    }
    const totalVal = invests.reduce((s,inv)=>s+(inv.currentValue||0),0);
    document.getElementById('active-invest-total').textContent = '市值 ¥'+totalVal.toFixed(0);
    this._attachEvents();
  },

  renderSold() {
    const invests = DataStore.getInvestments().filter(inv=>inv.status==='sold');
    const list = document.getElementById('sold-invest-list');
    if (!invests.length) {
      list.innerHTML = '<div style="padding:var(--space-3) 0;font-size:0.82rem;color:var(--color-text-muted)">还没有落袋的收益</div>';
    } else {
      invests.sort((a,b)=>(b.soldAmount||0)-(a.soldAmount||0));
      list.innerHTML = invests.map(inv => this._investHtml(inv, true)).join('');
    }
    const realizedProfit = invests.reduce((s,inv)=>s+(inv.realizedProfit||0),0);
    document.getElementById('sold-invest-total').textContent = '已实现 +¥'+realizedProfit.toFixed(0);
    this._attachEvents();
  },

  _attachEvents() {
    const attachList = (listId) => {
      const list = document.getElementById(listId);
      if (!list) return;
      list.onclick = (e) => {
        // Sell
        const sell = e.target.closest('[data-action="sell-invest"]');
        if (sell) {
          const id = sell.dataset.id; const inv = DataStore.getInvestments().find(i=>i.id===id);
          if (inv) {
            const totalPrincipal = this._calcTotalPrincipal(inv);
            const v = prompt('卖出落袋 — 请输入卖出金额 ('+inv.name+'):\n投入本金: '+formatAmount(totalPrincipal), inv.currentValue||totalPrincipal);
            if (v!==null) {
              const n = parseFloat(v);
              if (!isNaN(n) && n>0) {
                const realizedProfit = Math.round((n - totalPrincipal)*100)/100;
                DataStore.updateInvestment(id, {
                  status: 'sold', soldAmount: Math.round(n*100)/100,
                  soldDate: DateUtils.today(), realizedProfit,
                  lastUpdated: DateUtils.today()
                });
                this.render();
                const emoji = realizedProfit>=0?'🎉':'📉';
                Toast.show(emoji+' '+inv.name+' 已卖出! '+formatAmount(n)+' | 盈亏: '+formatMoney(realizedProfit));
              }
            }
          }
          return;
        }
        // Update value
        const uv = e.target.closest('[data-action="update-value"]');
        if (uv) {
          const id = uv.dataset.id; const inv = DataStore.getInvestments().find(i=>i.id===id);
          if (inv) { const v = prompt('更新当前市值 ('+inv.name+'):', inv.currentValue||''); if (v!==null) { const n=parseFloat(v); if (!isNaN(n)) { DataStore.updateInvestment(id, { currentValue: Math.round(n*100)/100, lastUpdated: DateUtils.today() }); this.render(); } } }
          return;
        }
        // Edit
        const edit = e.target.closest('[data-action="edit-invest"]');
        if (edit) {
          const id = edit.dataset.id; const inv = DataStore.getInvestments().find(i=>i.id===id);
          if (inv) { this._editDialog(inv); }
          return;
        }
        // Delete
        const del = e.target.closest('[data-action="delete-invest"]');
        if (del) {
          const id = del.dataset.id; const inv = DataStore.getInvestments().find(i=>i.id===id);
          if (inv && confirm('删除 "'+inv.name+'"？')) { DataStore.deleteInvestment(id); this.render(); }
        }
      };
    };
    attachList('active-invest-list');
    attachList('sold-invest-list');
  },

  _editDialog(inv) {
    const name = prompt('名称', inv.name); if (name===null) return;
    const principal = parseFloat(prompt('初始本金', inv.principal||0)); if (isNaN(principal)) return;
    const currentVal = parseFloat(prompt('当前市值', inv.currentValue||principal)); if (isNaN(currentVal)) return;
    const dailyAmt = parseFloat(prompt('每日定投金额', inv.dailyAmount||0)); if (isNaN(dailyAmt)) return;
    const typeMap = { fund:'基金', stock:'股票', deposit:'定期', other:'其他' };
    const type = prompt('类型 (fund/stock/deposit/other)', inv.type||'fund');
    DataStore.updateInvestment(inv.id, {
      name: name.trim(), principal: Math.round(principal*100)/100,
      currentValue: Math.round(currentVal*100)/100,
      dailyAmount: Math.round(dailyAmt*100)/100,
      type: type||inv.type,
      lastUpdated: DateUtils.today()
    });
    this.render(); Toast.show('已更新: '+name);
  },

  _initForm() {
    document.getElementById('add-invest-btn').addEventListener('click', () => { document.getElementById('invest-form').classList.toggle('active'); });
    document.getElementById('inv-start').value = DateUtils.today();
    document.getElementById('inv-save').addEventListener('click', () => {
      const name = document.getElementById('inv-name').value.trim();
      const principal = parseFloat(document.getElementById('inv-principal').value) || 0;
      const currentVal = parseFloat(document.getElementById('inv-current').value) || principal;
      const dailyAmt = parseFloat(document.getElementById('inv-daily').value) || 0;
      const startDate = document.getElementById('inv-start').value;
      if (!name) { Toast.show('请填写理财名称'); return; }
      DataStore.addInvestment({
        id: 'inv-'+generateId(), name,
        type: document.getElementById('inv-type').value,
        principal: Math.round(principal*100)/100,
        currentValue: Math.round(currentVal*100)/100,
        dailyAmount: Math.round(dailyAmt*100)/100,
        startDate, lastUpdated: DateUtils.today(),
        status: 'active', soldAmount: null, soldDate: null, realizedProfit: null,
        note: '', createdAt: DateUtils.nowISO()
      });
      document.getElementById('inv-name').value = '';
      document.getElementById('inv-principal').value = '';
      document.getElementById('inv-current').value = '';
      document.getElementById('inv-daily').value = '';
      document.getElementById('invest-form').classList.remove('active');
      this.render(); Toast.show('✅ 已添加理财: '+name);
    });
    document.getElementById('inv-cancel').addEventListener('click', () => { document.getElementById('invest-form').classList.remove('active'); });
  }
};

/* ============================================================
   ROI MODULE (standalone)
   ============================================================ */
const ROI = {
  init() {
    document.getElementById('roi-category').innerHTML = EXPENSE_CATEGORIES.map(c=>'<option value="'+c.key+'">'+c.emoji+' '+c.key+'</option>').join('');
    document.getElementById('roi-date').value = DateUtils.today();
    document.getElementById('roi-submit').addEventListener('click', ()=>this.add());
    document.getElementById('roi-list').addEventListener('click', e => {
      const ub=e.target.closest('.roi-use-btn'); if(ub){const id=ub.dataset.id;const it=DataStore.getRoiItems().find(r=>r.id===id);if(it){DataStore.updateRoiItem(id,{useCount:(it.useCount||0)+1});ub.classList.add('used');setTimeout(()=>ub.classList.remove('used'),450);this.render();Toast.show('✅ '+it.name+' 使用+1 | '+formatAmount(it.cost/((it.useCount||0)+1))+'/次');}return;}
      const db=e.target.closest('[data-action="roi-delete"]');if(db){const id=db.dataset.id;const it=DataStore.getRoiItems().find(r=>r.id===id);if(it&&confirm('删除 "'+it.name+'" 的回本追踪？')){DataStore.deleteRoiItem(id);this.render();Toast.show('已删除: '+it.name);}return;}
      const eb=e.target.closest('[data-action="roi-edit"]');if(eb){const id=eb.dataset.id;const it=DataStore.getRoiItems().find(r=>r.id===id);if(it)this.edit(it);}
    });
    this.render();
  },
  render() { this.renderList(); },
  add() {
    const n=document.getElementById('roi-name').value.trim(),d=document.getElementById('roi-date').value;
    const c=parseFloat(document.getElementById('roi-cost').value),t=parseFloat(document.getElementById('roi-target').value)||0;
    const cat=document.getElementById('roi-category').value;
    if(!n||isNaN(c)||c<=0){Toast.show('请填写名称和金额');return;}
    DataStore.addRoiItem({id:'roi-'+generateId(),name:n,purchaseDate:d,cost:Math.round(c*100)/100,useCount:0,targetPerUse:Math.round(t*100)/100,category:cat,note:'',createdAt:DateUtils.nowISO()});
    document.getElementById('roi-name').value='';document.getElementById('roi-cost').value='';document.getElementById('roi-target').value='';
    this.render(); Toast.show('✅ 开始追踪: '+n+' ('+formatAmount(c)+')');
  },
  edit(it) {
    const n=prompt('物品名称',it.name);if(n===null)return;
    const c=parseFloat(prompt('金额',it.cost));if(isNaN(c)||c<=0)return;
    const t=parseFloat(prompt('目标 ¥/次 (0=不设)',it.targetPerUse||0));
    const u=parseInt(prompt('使用次数',it.useCount||0));if(isNaN(u)||u<0)return;
    DataStore.updateRoiItem(it.id,{name:n.trim(),cost:Math.round(c*100)/100,targetPerUse:Math.round((t||0)*100)/100,useCount:u});
    this.render(); Toast.show('已更新: '+n);
  },
  renderList() {
    const ct=document.getElementById('roi-list'); const items=DataStore.getRoiItems();
    if(!items.length){ct.innerHTML='<div style="padding:var(--space-3) 0;font-size:0.82rem;color:var(--color-text-muted)">还没有回本追踪</div>';return;}
    items.sort((a,b)=>b.cost-a.cost);
    ct.innerHTML = items.map(it=>this._card(it)).join('');
  },
  _card(it) {
    const cat=getCat(it.category); const cpu=it.useCount>0?it.cost/it.useCount:it.cost;
    const days=DateUtils.daysBetween(it.purchaseDate,DateUtils.today());
    const upw=days>=7?(it.useCount/(days/7)).toFixed(1):'—';
    const hasT=it.targetPerUse>0; const tp=hasT?Math.min(100,(it.targetPerUse/Math.max(cpu,0.01))*100):0;
    const reached=hasT&&cpu<=it.targetPerUse;
    return `<div class="roi-card"><div class="roi-card-header"><div><span class="roi-card-name">${escapeHtml(it.name)}</span><span style="font-size:0.78rem;color:var(--color-text-muted);margin-left:6px">${cat.emoji} ${it.category}</span></div><div class="roi-card-meta">${it.purchaseDate} · ${formatAmount(it.cost)}</div></div><div class="roi-card-stats"><div class="roi-stat"><div class="roi-stat-value">${it.useCount}次</div><div class="roi-stat-label">已使用</div></div><div class="roi-stat ${reached?'success':'warning'}"><div class="roi-stat-value">${formatAmount(cpu)}</div><div class="roi-stat-label">每次成本</div></div><div class="roi-stat"><div class="roi-stat-value">${upw}次/周</div><div class="roi-stat-label">使用频率</div></div></div>${hasT?`<div class="roi-progress-wrap"><div class="roi-progress-info"><span>${reached?'✅ 已达标!':'目标: '+formatAmount(it.targetPerUse)+'/次'}</span><span>${reached?'':'还差 '+formatAmount(cpu-it.targetPerUse)}</span></div><div class="roi-progress-bar"><div class="roi-progress-fill" style="width:${tp}%;background:${reached?'var(--color-success)':'linear-gradient(90deg,var(--color-danger),var(--color-warning))'}"></div><div class="roi-progress-target" style="left:${tp}%"></div></div></div>`:'<div style="margin-bottom:12px;font-size:0.75rem;color:var(--color-text-muted)">未设置目标成本</div>'}<div class="roi-card-actions"><button class="roi-use-btn" data-id="${it.id}">📈 +1 使用</button><button class="btn-sm-outline" data-action="roi-edit" data-id="${it.id}">编辑</button><button class="btn-sm-outline danger" data-action="roi-delete" data-id="${it.id}">删除</button></div></div>`;
  }
};

/* ============================================================
   TAB NAVIGATION
   ============================================================ */
const TabNav = {
  init() {
    document.getElementById('tab-nav').addEventListener('click', e => {
      const b = e.target.closest('.tab-btn'); if (!b) return; this.switchTab(b.dataset.tab);
    });
  },
  switchTab(id) {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    const b=document.querySelector('[data-tab="'+id+'"]');if(b)b.classList.add('active');
    const p=document.getElementById('tab-'+id);if(p)p.classList.add('active');
    App.renderTab(id);
  }
};

/* ============================================================
   APP ORCHESTRATOR
   ============================================================ */
const App = {
  state: { sp:'month', sy:new Date().getFullYear(), cs:'', ce:'', page:1, psize:50, summaryViewType:'expense' },

  init() {
    Toast.init(); TabNav.init(); QuickAdd.init(); BankCards.init(); Investments.init(); ROI.init();
    document.getElementById('export-csv-btn').addEventListener('click',()=>{const r=this._sr();ExportCSV.download(DataStore.getRecords({startDate:r.start,endDate:r.end}),this.state.sy);});
    document.getElementById('apply-custom-range').addEventListener('click',()=>{this.state.cs=document.getElementById('custom-start').value;this.state.ce=document.getElementById('custom-end').value;this.state.sp='custom';this.renderSummaryTab();});
    this._initF();
    if(DataStore.load().records.length===0){document.getElementById('onboarding-hint').innerHTML='<div class="onboarding-tip">👋 欢迎！在下方开始记第一笔吧～</div>';}
    // Summary type toggle
    document.getElementById('summary-type-toggle').addEventListener('click', e => {
      const p = e.target.closest('.summary-type-pill');
      if (p) {
        document.querySelectorAll('.summary-type-pill').forEach(x=>x.classList.remove('active'));
        p.classList.add('active');
        this.state.summaryViewType = p.dataset.stype;
        this.renderSummaryTab();
      }
    });
    document.getElementById('filter-category').innerHTML='<option value="">全部分类</option>'+EXPENSE_CATEGORIES.map(c=>'<option value="'+c.key+'">'+c.emoji+' '+c.key+'</option>').join('')+INCOME_CATEGORIES.map(c=>'<option value="'+c.key+'">'+c.emoji+' '+c.key+'</option>').join('');
    this.renderTab('record'); this._uh();
    document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.getElementById('tab-record').classList.contains('active')){document.getElementById('record-amount').value='';document.getElementById('record-note').value='';document.getElementById('record-amount').focus();}});
  },

  refreshAll() { DataStore.invalidateCache(); this._uh(); const p=document.querySelector('.tab-panel.active'); if(p)this.renderTab(p.id.replace('tab-','')); },
  _uh() {
    const n=new Date(); const r=DateUtils.getMonthRange(n.getFullYear(),n.getMonth()+1);
    const tExp=Calculator.getPeriodTotal(r.start,r.end,'expense');
    const tInc=Calculator.getPeriodTotal(r.start,r.end,'income');
    const net=tInc-tExp;
    document.getElementById('header-expense').textContent=formatAmount(tExp);
    document.getElementById('header-income').textContent=formatAmount(tInc);
    const netEl=document.getElementById('header-net');
    netEl.textContent=(net>=0?'+':'')+formatAmount(net);
    netEl.className='h-amount '+(net>=0?'net-positive':'net-negative');
  },

  renderTab(id) {
    DataStore.invalidateCache(); this._uh();
    switch(id) {
      case 'record': this._rR(); break;
      case 'summary': this.renderSummaryTab(); break;
      case 'cards': BankCards.render(); break;
      case 'invest': Investments.render(); break;
      case 'roi': ROI.render(); break;
      case 'all-records': this._rA(); break;
    }
    ['recent-records','all-records-list'].forEach(id=>RecordList.attach(id));
  },

  _rR() {
    const n=new Date(); const r=DateUtils.getMonthRange(n.getFullYear(),n.getMonth()+1);
    SummaryCard.render('record-summary-card',r.start,r.end,'expense');
    const rc=DataStore.getRecords().slice(0,30);
    RecordList.render('recent-records',rc,true);
    if(rc.length>0)document.getElementById('onboarding-hint').innerHTML='';
  },

  _sr() {
    const y=this.state.sy; const n=new Date();
    switch(this.state.sp){
      case'month':return DateUtils.getMonthRange(n.getFullYear(),n.getMonth()+1);
      case'quarter':return DateUtils.getQuarterRange(n.getFullYear(),Math.ceil((n.getMonth()+1)/3));
      case'half':return DateUtils.getSemiAnnualRange(n.getFullYear(),n.getMonth()<6?1:2);
      case'year':return DateUtils.getYearRange(y);
      case'custom':return{start:this.state.cs,end:this.state.ce};
      default:return DateUtils.getMonthRange(n.getFullYear(),n.getMonth()+1);
    }
  },

  renderSummaryTab() {
    const r=this._sr(); const y=this.state.sy; const days=DateUtils.daysBetween(r.start,r.end);
    const vt = this.state.summaryViewType;
    this._rPS(); document.getElementById('custom-start').value=r.start; document.getElementById('custom-end').value=r.end;
    SummaryCard.render('summary-stats',r.start,r.end,vt);
    const bd=Calculator.getCategoryBreakdown(r.start,r.end,vt);
    const vLabel = vt==='income'?'收入':'支出';
    document.getElementById('pie-title').textContent = vLabel+'分类占比';
    document.getElementById('top10-title').textContent = 'TOP 10 大额'+vLabel;
    Charts.renderDoughnut('summary-pie',bd,'');
    CatRank.render('category-ranking',bd,Calculator.getPeriodTotal(r.start,r.end,vt));
    let lbs,dt,tt;
    if(days<=31){const dl=Calculator.getDailyTotals(r.start,r.end,vt);lbs=dl.map(d=>parseInt(d.date.slice(8))+'日');dt=dl.map(d=>d.total);tt=vLabel+'每日趋势';}
    else if(days<=120){const wl=Calculator.getWeeklyTotals(r.start,r.end,vt);lbs=wl.map(w=>w.week.slice(5));dt=wl.map(w=>w.total);tt=vLabel+'每周趋势';}
    else {lbs=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];dt=Calculator.getMonthlyTotals(y,vt);tt=vLabel+'每月趋势';}
    document.getElementById('trend-title').textContent = tt;
    const nn=new Date(); const hi=this.state.sp==='month'?nn.getDate()-1:(this.state.sp==='year'?nn.getMonth():-1);
    Charts.renderBarChart('summary-trend',lbs,dt,hi>=0&&hi<lbs.length?hi:-1);
    Top10.render(Calculator.getTopNRecords(10,r.start,r.end,vt));
  },

  _rPS() {
    const ct=document.getElementById('summary-period-selector');
    const ps=[{k:'month',l:'本月'},{k:'quarter',l:'本季'},{k:'half',l:'近半年'},{k:'year',l:'全年'},{k:'custom',l:'自定义'}];
    const ys=DateUtils.getAvailableYears(); const y=this.state.sy;
    let h='<div class="period-selector">'; ps.forEach(p=>{h+='<button class="period-pill'+(p.k===this.state.sp?' active':'')+'" data-period="'+p.k+'">'+p.l+'</button>';});
    h+='<div class="year-nav-group"><button class="year-nav-btn" data-yd="-1">◀</button><span class="year-nav-label">'+y+'年</span><button class="year-nav-btn" data-yd="1">▶</button></div></div>';
    ct.innerHTML=h;
    ct.onclick=e=>{const pl=e.target.closest('.period-pill');if(pl){this.state.sp=pl.dataset.period;document.getElementById('summary-custom-range').classList.toggle('active',pl.dataset.period==='custom');this.renderSummaryTab();}const nb=e.target.closest('.year-nav-btn');if(nb){const d=parseInt(nb.dataset.yd);const idx=ys.indexOf(this.state.sy);const ni=idx+d;if(ni>=0&&ni<ys.length){this.state.sy=ys[ni];this.renderSummaryTab();}}};
    document.getElementById('summary-custom-range').classList.toggle('active',this.state.sp==='custom');
  },

  _initF() {
    const h=()=>{this.state.page=1;this._rA();};
    ['search-note','filter-category','filter-type','sort-by'].forEach(id=>{document.getElementById(id).addEventListener('input',h);document.getElementById(id).addEventListener('change',h);});
    ['filter-date-start','filter-date-end'].forEach(id=>document.getElementById(id).addEventListener('change',h));
    document.getElementById('clear-filters').addEventListener('click',()=>{document.getElementById('search-note').value='';document.getElementById('filter-category').value='';document.getElementById('filter-type').value='';document.getElementById('filter-date-start').value='';document.getElementById('filter-date-end').value='';document.getElementById('sort-by').value='date-desc';this.state.page=1;this._rA();});
  },

  _rA() {
    const ns=document.getElementById('search-note').value.trim(); const cat=document.getElementById('filter-category').value;
    const tp=document.getElementById('filter-type').value;
    const ds=document.getElementById('filter-date-start').value; const de=document.getElementById('filter-date-end').value;
    const sb=document.getElementById('sort-by').value;
    let rs=DataStore.getRecords({startDate:ds||undefined,endDate:de||undefined,category:cat||undefined,type:tp||undefined,noteSearch:ns||undefined});
    if(sb==='date-asc')rs.sort((a,b)=>a.date.localeCompare(b.date)); else if(sb==='amount-desc')rs.sort((a,b)=>b.amount-a.amount); else if(sb==='amount-asc')rs.sort((a,b)=>a.amount-b.amount);
    const tpgs=Math.ceil(rs.length/this.state.psize)||1; if(this.state.page>tpgs)this.state.page=tpgs;
    const paged=rs.slice((this.state.page-1)*this.state.psize,this.state.page*this.state.psize);
    document.getElementById('filtered-record-count').textContent='共 '+rs.length+' 条'+(ns||cat||tp||ds||de?'（已筛选）':'');
    RecordList.render('all-records-list',paged,true); this._rP(tpgs);
  },

  _rP(tpgs) {
    const ct=document.getElementById('pagination'); if(tpgs<=1){ct.innerHTML='';return;}
    const cp=this.state.page; let h='';h+='<button class="page-btn" data-page="'+(cp-1)+'"'+(cp<=1?' disabled':'')+'>◀</button>';
    for(let i=1;i<=tpgs;i++){if(tpgs>7&&i>3&&i<tpgs-2&&i!==cp&&i!==cp-1&&i!==cp+1){if(i===4)h+='<span style="padding:0 3px;color:var(--color-text-muted)">…</span>';continue;}h+='<button class="page-btn'+(i===cp?' active':'')+'" data-page="'+i+'">'+i+'</button>';}
    h+='<button class="page-btn" data-page="'+(cp+1)+'"'+(cp>=tpgs?' disabled':'')+'>▶</button>';
    ct.innerHTML=h;
    ct.onclick=e=>{const b=e.target.closest('.page-btn');if(!b||b.disabled)return;const p=parseInt(b.dataset.page);if(p>=1&&p<=tpgs){this.state.page=p;this._rA();document.getElementById('tab-content').scrollIntoView({behavior:'smooth'});}};
  }
};

/* ============================================================
   EXPORT CSV
   ============================================================ */
const ExportCSV = {
  download(records, year) {
    const BOM='﻿'; const headers=['日期','类型','分类','金额','备注'];
    const rows=records.map(r=>[r.date,r.type==='income'?'收入':'支出',r.category,r.amount.toFixed(2),'"'+(r.note||'').replace(/"/g,'""')+'"']);
    const csv=BOM+[headers,...rows].map(row=>row.join(',')).join('\n');
    const b=new Blob([csv],{type:'text/csv;charset=utf-8;'}); const u=URL.createObjectURL(b);
    const a=document.createElement('a');a.href=u;a.download='记账导出-'+year+'-'+DateUtils.today()+'.csv';a.click();
    URL.revokeObjectURL(u); Toast.show('✅ 已导出 '+records.length+' 条记录');
  }
};
